name: Build 25.12.x IMG.GZ x86-64

on:
  workflow_dispatch:
    inputs:
      custom_router_ip:
        description: "请设置路由器的管理地址(格式: 192.168.x.x)"
        required: true
        default: "192.168.15.15"
      profile:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '2048'
      enable_store:
        description: "集成 iStore 第三方应用商店"
        required: false
        type: boolean
        default: false
      include_docker:
        description: "是否编译 Docker 插件"
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置 WAN 口 PPPoE 拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      pppoe_account:
        description: "宽带账号 (若启用PPPoE)"
        required: false
      pppoe_password:
        description: "宽带密码 (若启用PPPoE)"
        required: false

permissions:
  contents: write

jobs:
  build_immortalwrt:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ 安装云端打包全格式依赖全家桶
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xz-utils patch unzip subversion \
            flex bison python3 python3-pip wget zstd qemu-utils genisoimage mtools dosfstools

      - name: 🛑 云端前置断言：校验 PPPoE 输入
        run: |
          if [[ "${{ inputs.enable_pppoe }}" == "yes" ]]; then
            if [[ -z "${{ inputs.pppoe_account }}" || -z "${{ inputs.pppoe_password }}" ]]; then
              echo "❌ 错误: 启用了拨号但未填写账号或密码！"
              exit 1
            fi
          fi

      - name: 📝 动态处理 UI 菜单变量映射
        run: |
          # 创建配置资产区
          mkdir -p ${{ github.workspace }}/files/etc/config
          mkdir -p ${{ github.workspace }}/shell
          mkdir -p ${{ github.workspace }}/extra-packages
          
          # 注入自定义 IP 文本
          echo "${{ github.event.inputs.custom_router_ip }}" > ${{ github.workspace }}/files/etc/config/custom_router_ip.txt
          
          # 初始化或清空外部包脚本
          echo 'CUSTOM_PACKAGES=""' > ${{ github.workspace }}/shell/apk-custom-packages.sh
          
          # 如果勾选了商店，动态追加包名
          if [ "${{ github.event.inputs.enable_store }}" == "true" ]; then
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-app-store"' >> ${{ github.workspace }}/shell/apk-custom-packages.sh
            echo "✅ 网页勾选：已追加映射 luci-app-store 变量"
          fi

      - name: ⏬ 官仓直供：下载新版 Zst 编译器并解压
        run: |
          mkdir -p /home/runner/immortalwrt_build
          cd /home/runner/immortalwrt_build
          URL="https://downloads.immortalwrt.org/releases/25.12.0/targets/x86/64/immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64.tar.zst"
          wget -q --show-progress "$URL"
          tar -I zstd -xf "immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64.tar.zst"
          rm -f "immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64.tar.zst"

      - name: 🚚 同步并组合本地建筑材料
        run: |
          TARGET_DIR="/home/runner/immortalwrt_build/immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64"
          
          mkdir -p "$TARGET_DIR/files" "$TARGET_DIR/shell" "$TARGET_DIR/extra-packages"
          [ -d "${{ github.workspace }}/files" ] && cp -r ${{ github.workspace }}/files/* "$TARGET_DIR/files/" || true
          [ -d "${{ github.workspace }}/shell" ] && cp -r ${{ github.workspace }}/shell/* "$TARGET_DIR/shell/" || true
          [ -d "${{ github.workspace }}/extra-packages" ] && cp -r ${{ github.workspace }}/extra-packages/* "$TARGET_DIR/extra-packages/" || true
          
          # 脚本赋权
          [ -f "$TARGET_DIR/shell/apk-prepare-packages.sh" ] && chmod +x "$TARGET_DIR/shell/apk-prepare-packages.sh" || true
          
          cp ${{ github.workspace }}/x86-64/build25.sh "$TARGET_DIR/build25.sh"
          chmod +x "$TARGET_DIR/build25.sh"

      - name: ✅ 纯原生运行：执行本地版编译脚本 (make image)
        env:
          PROFILE: ${{ github.event.inputs.profile }}
          INCLUDE_DOCKER: ${{ github.event.inputs.include_docker }}
          ENABLE_PPPOE: ${{ github.event.inputs.enable_pppoe }}
          PPPOE_ACCOUNT: ${{ github.event.inputs.pppoe_account }}
          PPPOE_PASSWORD: ${{ github.event.inputs.pppoe_password }}
        run: |
          TARGET_DIR="/home/runner/immortalwrt_build/immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64"
          cd "$TARGET_DIR"
          ./build25.sh

      - name: ✅ 精准拦截：提取唯一的 ext4-combined-efi.img.gz 到工作区
        id: tag
        run: |
          TARGET_DIR="/home/runner/immortalwrt_build/immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64"
          find "$TARGET_DIR/bin/targets" -name "*ext4-combined-efi.img.gz" -exec cp {} ${{ github.workspace }}/ \;
          
          if ls ${{ github.workspace }}/*ext4-combined-efi.img.gz 1>/dev/null 2>&1; then
            echo "✅ 成功提取到唯一的 ext4 固件包！"
          else
            echo "❌ 提取失败，未发现目标固件！"
            exit 1
          fi
          echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: 🚀 自动发布 .img.gz 固件到 Releases 页面
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "ImmortalWrt 25.12.0 精简定制固件"
          body: |
            ## 🎉 固件定制成功！
            - **网关后台地址**: `${{ github.event.inputs.custom_router_ip }}`
            - **默认用户名**: `root` (密码为空)
          files: |
            *ext4-combined-efi.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
