# 此工作流完全模仿本地 wubuntu 实体机运行逻辑
# 自动化编译完成后，精准提取唯一的 ext4-combined-efi.img.gz 固件并自动发布到 Release 页面
name: Build 25.12.x IMG.GZ x86-64

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择luci版本"
        required: false
        default: "25.12.0"
        type: choice
        options:
          - 25.12.0-rc1
          - 25.12.0-rc2
          - 25.12.0
      profile:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '2048' # 对齐你本地的默认大小
      include_docker:
        description: "是否编译 Docker 插件"
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  contents: write

jobs:
  build_immortalwrt:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ 安装本地编译所需基础依赖包 (完全模拟 wubuntu 环境)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xz-utils patch unzip subversion \
            flex bison python3 python3-pip

      - name: ⏬ 官仓直供：直接下载新版 Image Builder 编译器
        run: |
          mkdir -p /home/runner/immortalwrt_build
          cd /home/runner/immortalwrt_build
          VERSION="${{ github.event.inputs.luci_version }}"
          IB_NAME="immortalwrt-imagebuilder-${VERSION}-x86-64.Linux-x86_64"
          URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/x86/64/${IB_NAME}.tar.xz"
          
          echo "📥 正在下载官仓编译器: $URL"
          wget -q "$URL"
          tar -xJf "${IB_NAME}.tar.xz"
          rm -f "${IB_NAME}.tar.xz"

      - name: 🚚 同步并组合本地建筑材料
        run: |
          VERSION="${{ github.event.inputs.luci_version }}"
          TARGET_DIR="/home/runner/immortalwrt_build/immortalwrt-imagebuilder-${VERSION}-x86-64.Linux-x86_64"
          
          mkdir -p "$TARGET_DIR/files" "$TARGET_DIR/shell"
          [ -d "${{ github.workspace }}/files" ] && cp -r ${{ github.workspace }}/files/* "$TARGET_DIR/files/" || true
          [ -d "${{ github.workspace }}/shell" ] && cp -r ${{ github.workspace }}/shell/* "$TARGET_DIR/shell/" || true
          
          # 将核心编译脚本送入工作目录
          cp ${{ github.workspace }}/x86-64/build25.sh "$TARGET_DIR/build25.sh"
          chmod +x "$TARGET_DIR/build25.sh"

      - name: ✅ 纯原生运行：执行本地版编译脚本 (make image)
        env:
          PROFILE: ${{ github.event.inputs.profile }}
          INCLUDE_DOCKER: ${{ github.event.inputs.include_docker }}
          VERSION_INPUT: ${{ github.event.inputs.luci_version }}
        run: |
          TARGET_DIR="/home/runner/immortalwrt_build/immortalwrt-imagebuilder-${VERSION_INPUT}-x86-64.Linux-x86_64"
          cd "$TARGET_DIR"
          ./build25.sh

      - name: ✅ 精准拦截：提取唯一的 ext4-combined-efi.img.gz 到工作区
        id: tag
        run: |
          VERSION="${{ github.event.inputs.luci_version }}"
          TARGET_DIR="/home/runner/immortalwrt_build/immortalwrt-imagebuilder-${VERSION}-x86-64.Linux-x86_64"
          
          # 雷达扫描：跨越新老版输出路径层级，只捞取目标 ext4 压缩包
          find "$TARGET_DIR/bin/targets" -name "*ext4-combined-efi.img.gz" -exec cp {} ${{ github.workspace }}/ \;
          
          # 安全校验机制
          if ls ${{ github.workspace }}/*ext4-combined-efi.img.gz 1>/dev/null 2>&1; then
            echo "✅ 成功提取到唯一的 ext4 固件包！"
            ls -lh ${{ github.workspace }}/*ext4-combined-efi.img.gz
          else
            echo "❌ 提取失败，未在输出目录中发现符合条件的 ext4 固件！"
            exit 1
          fi
          
          # 生成发布时间戳作为 Release Tag
          echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: 🚀 自动发布 .img.gz 固件到 Releases 页面
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "ImmortalWrt [${{ github.event.inputs.luci_version }}] EXT4 固件"
          body: |
            ## 🎉 固件原生云编译成功！
            
            - **网关默认静态 IP**: `192.168.15.15`
            - **文件系统类型**: `📦 EXT4 (专属纯净格式，支持系统内直接自由扩容)`
            - **集成精选插件**: OpenClash, AdGuardHome, Passwall, Samba4, Docker 汉化管理
          files: |
            # 锁定发布目标，其余任何格式概不上报
            *ext4-combined-efi.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
