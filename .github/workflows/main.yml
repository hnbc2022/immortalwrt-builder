name: Build 25.12.x IMG.GZ x86-64

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择luci版本"
        required: false
        default: "25.12.0"
        type: choice
        options:
          - 25.12.0-rc1
          - 25.12.0-rc2
          - 25.12.0
      profile:
        description: '请输入要编译固件大小 单位(MB)'
        required: true
        default: '2048' # 对应你本地的 ROOTFS_PARTSIZE=2048
      enable_store:
        description: "集成 store 商店"
        required: false
        type: boolean
        default: false
      include_docker:
        description: "是否编译 Docker 插件"
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

permissions:
  contents: write

jobs:
  build_immortalwrt:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create local directories
        run: |
          mkdir -p bin files custom shell

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build25.sh
      
      - name: Enable Store integration
        run: |
          if [ "${{ github.event.inputs.enable_store }}" == "true" ]; then
            echo 'export CUSTOM_PACKAGES="luci-app-store"' >> shell/apk-custom-packages.sh
            echo "✅ 已预备追加 luci-app-store"
          else
            echo "❎ 未启用 luci-app-store"
          fi

      - name: ✅ 正在本地容器化构建ImmortalWrt固件
        run: |
          profile="${{ github.event.inputs.profile }}"
          include_docker="${{ github.event.inputs.include_docker }}"
          luci_version="${{ github.event.inputs.luci_version }}"
          
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/custom:/home/build/immortalwrt/files/etc/config" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build25.sh:/home/build/immortalwrt/build.sh" \
            -e PROFILE=$profile \
            -e INCLUDE_DOCKER=$include_docker \
            immortalwrt/imagebuilder:x86-64-openwrt-${luci_version} /bin/bash /home/build/immortalwrt/build.sh

      # =======================================================
      # ✨ 核心控制：精准提取 .img.gz 并生成 Release 标签
      # =======================================================
      - name: ✅ 精准限制：提取唯一 .img.gz 固件
        id: tag
        run: |
          # 只把唯一的压缩包复制到宿主机根目录，把别的垃圾文件留在 bin 里随着 Docker 销毁而气化
          cp ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz ${{ github.workspace }}/
          
          # 生成唯一的日期时间标签（例如 2026.06.26-1500）
          echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: 🚀 自动发布 .img.gz 固件到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "ImmortalWrt 固件 [${{ github.event.inputs.luci_version }}] (.img.gz)"
          body: |
            ## 固件云编译成功！🎉
            
            - **LuCI 核心基础**: `${{ github.event.inputs.luci_version }}`
            - **网络默认静态 IP**: `192.168.15.15`
            - **输出格式**: `📦 .img.gz 压缩包`
            - **内置本地精选插件**: OpenClash, AdGuardHome, Passwall, Samba4, Docker
          files: |
            # 严格限制：只发布我们复制出来的 .img.gz 压缩包
            *-squashfs-combined-efi.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
